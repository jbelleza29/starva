name: CI

on: push

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          # Chromatic needs the full git history to track snapshot baselines.
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Chromatic
        # Builds Storybook and publishes snapshots. Visual *changes* are reviewed
        # in the Chromatic UI, so they don't fail the job — only real errors do.
        run: npx chromatic --exit-zero-on-changes
        env:
          CHROMATIC_PROJECT_TOKEN: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
